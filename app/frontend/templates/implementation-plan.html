<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Implementation Plan Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #4ba285 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea, #4ba285);
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header-stats {
            display: flex;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            padding: 15px 25px;
            border-radius: 15px;
            text-align: center;
            min-width: 120px;
        }

        .stat-card.success { background: linear-gradient(135deg, #00d2d3, #54a0ff); }
        .stat-card.warning { background: linear-gradient(135deg, #feca57, #ff9ff3); }
        .stat-card.info { background: linear-gradient(135deg, #48dbfb, #0abde3); }

        .view-controls {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .view-btn {
            background: linear-gradient(135deg, #667eea, #4ba285);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .view-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .view-btn.active {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
        }

        .filter-controls {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }

        .filter-tag {
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid #667eea;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .filter-tag.active {
            background: #667eea;
            color: white;
        }

        .plan-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        /* Timeline View */
        .timeline-view {
            position: relative;
        }

        .timeline-line {
            position: absolute;
            left: 30px;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(to bottom, #667eea, #4ba285);
            border-radius: 2px;
        }

        .week-section {
            margin-bottom: 40px;
            padding-left: 80px;
            position: relative;
        }

        .week-marker {
            position: absolute;
            left: 15px;
            top: 10px;
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #667eea, #4ba285);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .week-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #333;
        }

        .phase-card {
            background: white;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .phase-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }

        .phase-header {
            padding: 20px;
            background: linear-gradient(135deg, #f8f9ff, #e8ecff);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .phase-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
        }

        .phase-badges {
            display: flex;
            gap: 10px;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge.security { background: #ff6b6b; color: white; }
        .badge.compliance { background: #feca57; color: #333; }
        .badge.governance { background: #48dbfb; color: white; }
        .badge.critical { background: #ee5a24; color: white; }

        .phase-content {
            padding: 0 20px;
            max-height: 0;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        .phase-content.expanded {
            max-height: 2000px;
            padding: 20px;
        }

        .content-section {
            margin-bottom: 25px;
        }

        .content-section h4 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .command-block {
            background: #2d3748;
            color: #e2e8f0;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            margin-bottom: 10px;
            position: relative;
            overflow-x: auto;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #667eea;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .checklist {
            list-style: none;
        }

        .checklist li {
            padding: 8px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checklist li::before {
            content: '✓';
            color: #00d2d3;
            font-weight: bold;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d2d3, #54a0ff);
            transition: width 0.5s ease;
        }

        /* Kanban View */
        .kanban-view {
            display: none;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 20px;
        }

        .kanban-view.active {
            display: flex;
        }

        .kanban-column {
            min-width: 300px;
            background: rgba(248, 249, 255, 0.8);
            border-radius: 15px;
            padding: 20px;
        }

        .kanban-header {
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
            padding: 10px;
            background: linear-gradient(135deg, #667eea, #4ba285);
            color: white;
            border-radius: 10px;
        }

        .kanban-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .kanban-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .expand-icon {
            transition: transform 0.3s ease;
        }

        .expand-icon.rotated {
            transform: rotate(180deg);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header-stats {
                justify-content: center;
            }
            
            .view-controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .filter-controls {
                margin-left: 0;
                margin-top: 15px;
            }
            
            .week-section {
                padding-left: 60px;
            }
            
            .kanban-view {
                flex-direction: column;
            }
            
            .kanban-column {
                min-width: auto;
            }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 80%;
            max-height: 80%;
            overflow-y: auto;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Implementation Plan Dashboard</h1>
            <p>Comprehensive deployment strategy with security, compliance, and governance integration</p>
            <div class="header-stats">
                <div class="stat-card info">
                    <div><strong id="totalWeeks">4</strong></div>
                    <div>Weeks</div>
                </div>
                <div class="stat-card success">
                    <div><strong id="totalPhases">12</strong></div>
                    <div>Phases</div>
                </div>
                <div class="stat-card warning">
                    <div><strong id="securityItems">8</strong></div>
                    <div>Security Items</div>
                </div>
                <div class="stat-card">
                    <div><strong id="overallProgress">35</strong>%</div>
                    <div>Complete</div>
                </div>
            </div>
        </div>

        <div class="view-controls">
            <button class="view-btn active" onclick="switchView('timeline')">📅 Timeline View</button>
            <button class="view-btn" onclick="switchView('kanban')">📋 Kanban Board</button>
            
            <div class="filter-controls">
                <div class="filter-tag active" onclick="toggleFilter('all')">All</div>
                <div class="filter-tag" onclick="toggleFilter('security')">🔒 Security</div>
                <div class="filter-tag" onclick="toggleFilter('compliance')">📋 Compliance</div>
                <div class="filter-tag" onclick="toggleFilter('governance')">⚖️ Governance</div>
            </div>
        </div>

        <div class="plan-container">
            <div id="timelineView" class="timeline-view">
                <div class="timeline-line"></div>
                <div id="timelineContent"></div>
            </div>

            <div id="kanbanView" class="kanban-view">
                <div id="kanbanContent"></div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        // Real implementation plan data structure - populated from your API
        let implementationPlan = {
            projectName: "Loading...",
            totalWeeks: 0,
            weeks: []
        };

        // Global state for your existing functions
        let currentClusterId = null;
        let planData = null;
        // **INTEGRATION WITH YOUR EXISTING SYSTEM**
        
        // Function to integrate with your loadImplementationPlan
        function initializeWithRealData() {
            console.log('🔗 Integrating with existing implementation plan system...');
            
            // Try to get current cluster ID from your system
            if (typeof window.getCurrentClusterId === 'function') {
                currentClusterId = window.getCurrentClusterId();
                console.log('✅ Got cluster ID:', currentClusterId);
            }
            
            // Try to load existing plan data
            if (typeof window.loadImplementationPlan === 'function') {
                console.log('🔄 Loading real implementation plan data...');
                loadRealImplementationData();
            } else {
                console.log('📝 Using fallback data structure');
                implementationPlan = createFallbackPlan();
                renderDashboard();
            }
        }
        
        // Function to load real data from your API
        function loadRealImplementationData() {
            const apiCall = window.makeClusterAwareAPICall || fetch;
            
            apiCall('/api/implementation-plan')
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return response.json();
                })
                .then(data => {
                    console.log('📊 Real implementation data received:', data);
                    planData = data;
                    implementationPlan = transformYourDataToUIFormat(data);
                    renderDashboard();
                })
                .catch(error => {
                    console.error('❌ Error loading real data:', error);
                    implementationPlan = createFallbackPlan();
                    renderDashboard();
                });
        }
        
        // Transform your existing data structure to work with the UI
        function transformYourDataToUIFormat(data) {
            console.log('🔄 Transforming your data structure...');
            
            const phases = data.implementation_phases || [];
            const metadata = data.metadata || {};
            const timeline = data.timeline_optimization || {};
            
            // Group phases by weeks based on your data
            const weekGroups = {};
            let maxWeek = 0;
            
            phases.forEach((phase, index) => {
                const weekNumber = phase.start_week || Math.floor(index / 2) + 1;
                maxWeek = Math.max(maxWeek, weekNumber);
                
                if (!weekGroups[weekNumber]) {
                    weekGroups[weekNumber] = {
                        weekNumber: weekNumber,
                        title: `Week ${weekNumber}: ${getWeekTitle(phase, weekNumber)}`,
                        phases: []
                    };
                }
                
                // Transform your phase data to UI format
                const uiPhase = {
                    id: phase.id || `phase-${index}`,
                    title: phase.title || `Phase ${phase.phase_number || index + 1}`,
                    type: getPhaseTypes(phase),
                    progress: calculatePhaseProgress(phase),
                    description: phase.description || getPhaseDescription(phase),
                    commands: extractCommands(phase, data),
                    securityChecks: phase.security_checks || generateSecurityChecks(phase),
                    complianceItems: phase.compliance_items || generateComplianceItems(phase),
                    duration: phase.duration_weeks || 1,
                    savings: phase.projected_savings || 0,
                    priority: phase.priority_level || 'Medium',
                    risk: phase.risk_level || 'Low'
                };
                
                weekGroups[weekNumber].phases.push(uiPhase);
            });
            
            return {
                projectName: metadata.cluster_name || "AKS Cost Optimization Implementation",
                totalWeeks: maxWeek || timeline.total_weeks || 4,
                weeks: Object.values(weekGroups),
                metadata: metadata,
                timeline: timeline
            };
        }
        
        // Helper functions for data transformation
        function getWeekTitle(phase, weekNumber) {
            const weekTitles = {
                1: "Foundation & Setup",
                2: "Implementation & Deployment", 
                3: "Optimization & Tuning",
                4: "Monitoring & Finalization"
            };
            return weekTitles[weekNumber] || phase.type || "Implementation";
        }
        
        function getPhaseTypes(phase) {
            const types = [];
            if (phase.security_checks?.length > 0) types.push('security');
            if (phase.compliance_items?.length > 0) types.push('compliance');
            if (phase.governance_requirements?.length > 0) types.push('governance');
            if (phase.priority_level === 'High') types.push('critical');
            return types.length > 0 ? types : ['optimization'];
        }
        
        function calculatePhaseProgress(phase) {
            // Use your existing progress calculation or create one
            if (phase.progress !== undefined) return phase.progress;
            if (phase.status === 'completed') return 100;
            if (phase.status === 'in_progress') return 50;
            return 0;
        }
        
        function getPhaseDescription(phase) {
            if (phase.description) return phase.description;
            
            const descriptions = {
                'cost_optimization': 'Optimize resource allocation and reduce unnecessary costs',
                'hpa_setup': 'Configure Horizontal Pod Autoscaling for efficient resource usage',
                'rightsizing': 'Right-size workloads based on actual usage patterns',
                'storage_optimization': 'Optimize storage usage and implement lifecycle policies'
            };
            
            return descriptions[phase.type] || 'Implementation phase for cost optimization';
        }
        
        function extractCommands(phase, fullData) {
            // Extract commands from your data structure
            let commands = [];
            
            // From phase tasks
            if (phase.tasks) {
                phase.tasks.forEach(task => {
                    if (task.command) commands.push(task.command);
                });
            }
            
            // From executable commands in intelligence insights
            if (fullData.intelligence_insights?.dynamic_strategy_insights?.priority_areas) {
                fullData.intelligence_insights.dynamic_strategy_insights.priority_areas.forEach(area => {
                    if (area.executable_commands) {
                        commands = commands.concat(area.executable_commands);
                    }
                });
            }
            
            // From implementation commands
            if (phase.implementation_commands) {
                commands = commands.concat(phase.implementation_commands);
            }
            
            return commands.filter(cmd => cmd && cmd.trim());
        }
        
        function generateSecurityChecks(phase) {
            const defaultChecks = [
                "Security policies validated and applied",
                "Access controls verified and tested",
                "Audit logging enabled and configured"
            ];
            
            return phase.security_requirements || defaultChecks;
        }
        
        function generateComplianceItems(phase) {
            const defaultItems = [
                "Change management process followed",
                "Documentation updated and reviewed",
                "Stakeholder approval obtained"
            ];
            
            return phase.compliance_requirements || defaultItems;
        }
        
        function createFallbackPlan() {
            return {
                projectName: "AKS Cost Optimization Implementation",
                totalWeeks: 4,
                weeks: [
                    {
                        weekNumber: 1,
                        title: "Week 1: Analysis & Planning",
                        phases: [
                            {
                                id: "w1p1",
                                title: "Cost Analysis & Baseline",
                                type: ["analysis"],
                                progress: 0,
                                description: "Establish current cost baseline and identify optimization opportunities",
                                commands: ["# Run cost analysis", "kubectl top nodes", "kubectl top pods --all-namespaces"],
                                securityChecks: ["Access permissions verified", "Audit logging enabled"],
                                complianceItems: ["Baseline documentation created", "Stakeholder approval obtained"]
                            }
                        ]
                    }
                ]
            };
        }

        let currentView = 'timeline';
        let activeFilters = ['all'];

        // Render the main dashboard UI
        function renderDashboard() {
            console.log('🎨 Rendering implementation plan dashboard with real data...');
            
            updateStats();
            renderTimelineView();
            renderKanbanView();
            
            // Integrate with your existing copy functionality
            if (typeof window.initializeCopyFunctionality === 'function') {
                setTimeout(() => {
                    window.initializeCopyFunctionality();
                }, 500);
            }
        }

        function updateStats() {
            const totalPhases = implementationPlan.weeks.reduce((sum, week) => sum + week.phases.length, 0);
            const securityItems = implementationPlan.weeks.reduce((sum, week) => 
                sum + week.phases.reduce((phaseSum, phase) => 
                    phaseSum + (phase.type.includes('security') ? 1 : 0), 0), 0);
            
            const overallProgress = totalPhases > 0 ? Math.round(
                implementationPlan.weeks.reduce((sum, week) => 
                    sum + week.phases.reduce((phaseSum, phase) => phaseSum + (phase.progress || 0), 0), 0) / totalPhases
            ) : 0;

            document.getElementById('totalWeeks').textContent = implementationPlan.totalWeeks;
            document.getElementById('totalPhases').textContent = totalPhases;
            document.getElementById('securityItems').textContent = securityItems;
            document.getElementById('overallProgress').textContent = overallProgress;
            
            // Update header with real project name
            const headerTitle = document.querySelector('.header h1');
            if (headerTitle) {
                headerTitle.textContent = implementationPlan.projectName;
            }
        }

        function renderTimelineView() {
            const container = document.getElementById('timelineContent');
            container.innerHTML = '';

            implementationPlan.weeks.forEach(week => {
                const weekDiv = document.createElement('div');
                weekDiv.className = 'week-section';
                weekDiv.innerHTML = `
                    <div class="week-marker">${week.weekNumber}</div>
                    <div class="week-title">Week ${week.weekNumber}: ${week.title}</div>
                `;

                week.phases.forEach(phase => {
                    if (shouldShowPhase(phase)) {
                        const phaseDiv = document.createElement('div');
                        phaseDiv.className = 'phase-card';
                        phaseDiv.innerHTML = createPhaseCard(phase);
                        weekDiv.appendChild(phaseDiv);
                    }
                });

                container.appendChild(weekDiv);
            });
        }

        function renderKanbanView() {
            const container = document.getElementById('kanbanContent');
            container.innerHTML = '';

            implementationPlan.weeks.forEach(week => {
                const columnDiv = document.createElement('div');
                columnDiv.className = 'kanban-column';
                columnDiv.innerHTML = `<div class="kanban-header">Week ${week.weekNumber}<br><small>${week.title}</small></div>`;

                week.phases.forEach(phase => {
                    if (shouldShowPhase(phase)) {
                        const cardDiv = document.createElement('div');
                        cardDiv.className = 'kanban-card';
                        cardDiv.onclick = () => openPhaseModal(phase);
                        cardDiv.innerHTML = `
                            <div style="font-weight: 600; margin-bottom: 10px;">${phase.title}</div>
                            <div class="phase-badges">
                                ${phase.type.map(type => `<span class="badge ${type}">${type}</span>`).join('')}
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${phase.progress}%"></div>
                            </div>
                            <div style="text-align: center; font-size: 0.9rem; color: #666;">${phase.progress}% Complete</div>
                        `;
                        columnDiv.appendChild(cardDiv);
                    }
                });

                container.appendChild(columnDiv);
            });
        }

        function createPhaseCard(phase) {
            return `
                <div class="phase-header" onclick="togglePhase('${phase.id}')">
                    <div>
                        <div class="phase-title">${phase.title}</div>
                        <div style="color: #666; font-size: 0.9rem; margin-top: 5px;">${phase.description}</div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <div class="phase-badges">
                            ${phase.type.map(type => `<span class="badge ${type}">${type}</span>`).join('')}
                        </div>
                        <div style="text-align: center;">
                            <div style="font-weight: 600; color: #667eea;">${phase.progress}%</div>
                            <div style="font-size: 0.8rem; color: #666;">Complete</div>
                        </div>
                        <div class="expand-icon" id="icon-${phase.id}">▼</div>
                    </div>
                </div>
                <div class="phase-content" id="content-${phase.id}">
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${phase.progress}%"></div>
                    </div>
                    
                    <div class="content-section">
                        <h4>🔧 Commands</h4>
                        ${phase.commands.map(cmd => `
                            <div class="command-block">
                                <button class="copy-btn" onclick="copyToClipboard('${cmd.replace(/'/g, "\\'")}')">Copy</button>
                                ${cmd}
                            </div>
                        `).join('')}
                    </div>

                    <div class="content-section">
                        <h4>🔒 Security Checks</h4>
                        <ul class="checklist">
                            ${phase.securityChecks.map(check => `<li>${check}</li>`).join('')}
                        </ul>
                    </div>

                    <div class="content-section">
                        <h4>📋 Compliance Items</h4>
                        <ul class="checklist">
                            ${phase.complianceItems.map(item => `<li>${item}</li>`).join('')}
                        </ul>
                    </div>
                </div>
            `;
        }

        function shouldShowPhase(phase) {
            if (activeFilters.includes('all')) return true;
            return activeFilters.some(filter => phase.type.includes(filter));
        }

        function switchView(view) {
            currentView = view;
            
            // Update button states
            document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Show/hide views
            document.getElementById('timelineView').style.display = view === 'timeline' ? 'block' : 'none';
            document.getElementById('kanbanView').classList.toggle('active', view === 'kanban');
        }

        function toggleFilter(filter) {
            const filterElement = event.target;
            
            if (filter === 'all') {
                activeFilters = ['all'];
                document.querySelectorAll('.filter-tag').forEach(tag => tag.classList.remove('active'));
                filterElement.classList.add('active');
            } else {
                if (activeFilters.includes('all')) {
                    activeFilters = [];
                    document.querySelector('.filter-tag').classList.remove('active');
                }
                
                if (activeFilters.includes(filter)) {
                    activeFilters = activeFilters.filter(f => f !== filter);
                    filterElement.classList.remove('active');
                } else {
                    activeFilters.push(filter);
                    filterElement.classList.add('active');
                }
                
                if (activeFilters.length === 0) {
                    activeFilters = ['all'];
                    document.querySelector('.filter-tag').classList.add('active');
                }
            }

            renderTimelineView();
            renderKanbanView();
        }

        function togglePhase(phaseId) {
            const content = document.getElementById(`content-${phaseId}`);
            const icon = document.getElementById(`icon-${phaseId}`);
            
            content.classList.toggle('expanded');
            icon.classList.toggle('rotated');
        }

        function openPhaseModal(phase) {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modalContent');
            
            modalContent.innerHTML = `
                <h2>${phase.title}</h2>
                <p>${phase.description}</p>
                <div style="margin: 20px 0;">
                    <div class="phase-badges">
                        ${phase.type.map(type => `<span class="badge ${type}">${type}</span>`).join('')}
                    </div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${phase.progress}%"></div>
                </div>
                ${createPhaseCard(phase).split('</div>')[2]}
            `;
            
            modal.style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                event.target.textContent = 'Copied!';
                setTimeout(() => {
                    event.target.textContent = 'Copy';
                }, 2000);
            });
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Initialize dashboard when DOM is ready - INTEGRATED VERSION
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeWithRealData);
        } else {
            initializeWithRealData();
        }
        
        // Hook into your existing loadImplementationPlan function
        if (typeof window.loadImplementationPlan === 'function') {
            const originalLoad = window.loadImplementationPlan;
            window.loadImplementationPlan = function() {
                console.log('🔗 Intercepting loadImplementationPlan call...');
                
                // Run your original function first
                const result = originalLoad.apply(this, arguments);
                
                // Then integrate with our enhanced UI
                setTimeout(() => {
                    initializeWithRealData();
                }, 100);
                
                return result;
            };
        }
        
        // Hook into your existing displayImplementationPlan function
        if (typeof window.displayImplementationPlan === 'function') {
            const originalDisplay = window.displayImplementationPlan;
            window.displayImplementationPlan = function(data) {
                console.log('🔗 Intercepting displayImplementationPlan call with data:', data);
                
                // Store the data globally
                planData = data;
                
                // Transform and render with enhanced UI
                implementationPlan = transformYourDataToUIFormat(data);
                
                // Inject our enhanced UI into the existing container
                const container = document.getElementById('implementation-plan-container');
                if (container) {
                    // Add our enhanced UI content
                    container.innerHTML = `
                        <div class="enhanced-implementation-ui">
                            ${document.querySelector('.container').innerHTML}
                        </div>
                        <div class="original-implementation-content" style="display: none;">
                    `;
                    
                    // Call original function to populate original content  
                    const result = originalDisplay.apply(this, arguments);
                    
                    // Close the hidden div
                    container.innerHTML += '</div>';
                    
                    // Initialize our enhanced UI
                    renderDashboard();
                    
                    return result;
                } else {
                    // Fallback to original function
                    return originalDisplay.apply(this, arguments);
                }
            };
        }
        
        // Export functions for external use
        window.enhancedImplementationPlan = {
            renderDashboard,
            transformYourDataToUIFormat,
            loadRealImplementationData,
            switchView,
            toggleFilter,
            copyToClipboard,
            getCurrentPlanData: () => planData,
            getCurrentPlan: () => implementationPlan
        };
    </script>
</body>
</html>
