patterns:
- confidence: MEDIUM
  description: Suspicious CPU usage patterns indicating cryptocurrency mining
  indicators:
  - duration_minutes: 60
    metric: cpu_usage_percent
    threshold: 90
    type: resource_usage
  - description: Mining pool connection string
    pattern: stratum+tcp://
    type: network_connection
  - patterns:
    - xmrig
    - minerd
    - cpuminer
    - ccminer
    type: process_name
  mitigation: Monitor resource usage, implement network policies, scan for mining
    software
  pattern_id: THR-001
  severity: HIGH
  threat_name: Cryptocurrency Mining Activity
  threat_type: MALWARE
- confidence: HIGH
  description: Network patterns suggesting lateral movement within cluster
  indicators:
  - description: Port scanning activity from container
    patterns:
    - nmap
    - masscan
    - zmap
    type: network_scan
  - api_calls:
    - /api/v1/namespaces
    - /api/v1/pods
    - /api/v1/secrets
    description: Kubernetes API discovery attempts
    type: service_discovery
  mitigation: Implement network segmentation, monitor API access, enable audit logging
  pattern_id: THR-002
  severity: HIGH
  threat_name: Lateral Movement Attempt
  threat_type: APT
- confidence: MEDIUM
  description: Suspicious outbound network traffic indicating data exfiltration
  indicators:
  - direction: outbound
    duration_minutes: 30
    type: network_traffic
    volume_threshold_mb: 1000
  - description: Access to sensitive system files
    paths:
    - /etc/passwd
    - /etc/shadow
    - /etc/kubernetes
    type: file_access
  mitigation: Monitor network traffic, implement DLP, restrict file access
  pattern_id: THR-003
  severity: CRITICAL
  threat_name: Data Exfiltration
  threat_type: DATA_BREACH
