name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (compile + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/requirements.txt
          pip install flake8

      - name: Byte-compile all Python sources
        run: python -m compileall -q algorithms analytics application config infrastructure machine_learning mcp_server presentation shared *.py

      - name: Lint with flake8 (errors only)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.venv,frontend,node_modules,__pycache__,.git

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
