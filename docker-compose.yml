services:
  aks-optimizer:
    build: 
      context: .
      dockerfile: Dockerfile
    image: aks-optimizer:latest
    container_name: aks-cost-optimizer
    
    ports:
      - "5020:5000"
    
    volumes:
      # Data persistence only (no source code mounts for security)
      - sqlite_data:/app/infrastructure/persistence/database
      - ml_models:/app/machine_learning/data
      - app_logs:/app/logs
      
      # Mount Azure credentials to temp location for copying
      - ${HOME}/.azure:/tmp/host-azure:ro
      
      # Writable Azure config directory
      - azure_config:/home/appuser/.azure
      
    environment:
      # Flask settings - production mode for security
      - FLASK_ENV=${FLASK_ENV:-production}
      - FLASK_DEBUG=${FLASK_DEBUG:-0}
      - DATABASE_PATH=/app/data/aks_optimizer.db
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONPATH=/app
      
      # Azure settings
      - AZURE_CONFIG_DIR=/home/appuser/.azure
      - AZURE_CORE_COLLECT_TELEMETRY=false
      
      # Enable multi-subscription support
      - ENABLE_MULTI_SUBSCRIPTION=true
      - PARALLEL_PROCESSING=true
      
    restart: unless-stopped
    
    networks:
      - aks-network
    
    user: "1000:1000"
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5020/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  sqlite_data:
    driver: local
  ml_models:
    driver: local
  app_logs:
    driver: local
  app_cache:
    driver: local
  azure_config:
    driver: local

networks:
  aks-network:
    driver: bridge
