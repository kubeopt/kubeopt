version: '3.8'

services:
  aks-optimizer:
    build:
      dockerfile: Dockerfile.prod
    image: aks-optimizer:prod
    volumes:
      # No source code mounting in production
      - sqlite_data:/app/data
      - ml_models:/app/models
      - app_logs:/app/logs
      - app_cache:/app/cache
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      - LOG_LEVEL=WARNING
    read_only: true
    security_opt:
      - no-new-privileges:true
      - apparmor:docker-default
      - seccomp:default
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G