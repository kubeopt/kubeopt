version: '3.8'

services:
  aks-optimizer:
    build:
      dockerfile: Dockerfile
    image: aks-optimizer:prod
    volumes:
      # No source code mounting in production
      - sqlite_data:/app/infrastructure/persistence/database
      - ml_models:/app/machine_learning/data
      - app_logs:/app/logs
      - app_cache:/app/shared/cache
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      - LOG_LEVEL=WARNING
      - AZURE_CONFIG_DIR=/home/appuser/.azure
      - AZURE_CORE_COLLECT_TELEMETRY=false
      - PYTHONUNBUFFERED=1
      - MPLBACKEND=Agg
    read_only: true
    security_opt:
      - no-new-privileges:true
      - apparmor:docker-default
      - seccomp:default
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G