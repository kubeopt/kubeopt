{% extends "base.html" %}

{% block title %}
Login - kubeopt
{% endblock %}

{% block content %}
<div class="login-layout">
    <div class="login-container">
        <div class="login-card">
            <!-- Header -->
            <div class="login-header">
                <div class="login-logo">
                    <img src="{{ url_for('static', filename='images/kubeopt_eyecon.png') }}" alt="kubeopt" class="kubeopt-eye-icon">
                </div>
                <h1 class="login-title">kubeopt</h1>
                <p class="login-subtitle">Your Third Eye for Kubernetes</p>
            </div>
            
            <!-- Login Form -->
            <form class="login-form" method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            class="form-input" 
                            placeholder="Enter your username"
                            required
                        >
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            class="form-input" 
                            placeholder="Enter your password"
                            required
                        >
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" name="remember" id="remember">
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-label">Remember me</span>
                    </label>
                </div>
                
                <button type="submit" class="login-button">
                    <span class="button-text">Sign In</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>
            
            <!-- Footer -->
            <div class="login-footer">
                <div class="footer-links">
                    <a href="#" class="footer-link">Need help?</a>
                    <a href="#" class="footer-link">Privacy Policy</a>
                </div>
                <p class="footer-text">
                    Enterprise Kubernetes Optimization Platform
                </p>
            </div>
        </div>
        
        <!-- Background Pattern -->
        <div class="background-pattern">
            <div class="pattern-circle pattern-1"></div>
            <div class="pattern-circle pattern-2"></div>
            <div class="pattern-circle pattern-3"></div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_css %}
<!-- Login-specific styles -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
{% endblock %}

{% block extra_js %}
<!-- Login-specific JavaScript -->
<script src="{{ url_for('static', filename='js/login.js') }}"></script>
{% endblock %}
