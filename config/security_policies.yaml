# AKS Security Policies and Standards Configuration
# Replaces hardcoded security standards from policy_analyzer.py and security_standards.py
# Compatible with existing aks_implementation_standards.yaml and aks_scoring.yaml

version: 2025.1
metadata:
  description: "Comprehensive security policies, compliance frameworks, and standards"
  integrates_with: 
    - "aks_implementation_standards.yaml"
    - "aks_scoring.yaml"
  sources:
    - "CIS Kubernetes Benchmark v1.6.0"
    - "NIST Cybersecurity Framework v1.1"
    - "ISO/IEC 27001:2013"
    - "SOC 2 Type II"
    - "Azure Well-Architected Framework Security Pillar"

# ===================================================================
# SECURITY POLICY RULES
# ===================================================================
policy_rules:
  # Security Category Policies
  security_context_required:
    rule_id: "SEC001"
    name: "Security Context Required"
    description: "All containers must have security context defined"
    category: "Security"
    severity: "HIGH"
    resource_types: ["Deployment", "Pod", "StatefulSet", "DaemonSet"]
    rule_logic: "spec.template.spec.containers[*].securityContext must exist"
    remediation_template: "Add securityContext to container specification"
    compliance_mappings:
      CIS: "4.2.1"
      NIST: "PR.AC-4"
    enabled: true
    auto_remediable: false
    risk_multiplier: 1.2

  privileged_containers:
    rule_id: "SEC002"
    name: "No Privileged Containers"
    description: "Containers must not run in privileged mode"
    category: "Security"
    severity: "CRITICAL"
    resource_types: ["Deployment", "Pod", "StatefulSet", "DaemonSet"]
    rule_logic: "spec.template.spec.containers[*].securityContext.privileged must be false or undefined"
    remediation_template: "Remove privileged: true from container securityContext"
    compliance_mappings:
      CIS: "4.2.1"
      PCI-DSS: "2.2"
    enabled: true
    auto_remediable: false
    risk_multiplier: 2.0

  root_user_forbidden:
    rule_id: "SEC003"
    name: "Non-Root User Required"
    description: "Containers must not run as root user"
    category: "Security"
    severity: "HIGH"
    resource_types: ["Deployment", "Pod", "StatefulSet", "DaemonSet"]
    rule_logic: "spec.template.spec.containers[*].securityContext.runAsUser must be > 0"
    remediation_template: "Set runAsUser to non-zero value in securityContext"
    compliance_mappings:
      CIS: "4.2.6"
      NIST: "PR.AC-1"
    enabled: true
    auto_remediable: true
    risk_multiplier: 1.5

  image_pull_policy_always:
    rule_id: "SEC004"
    name: "Image Pull Policy Always"
    description: "Container images must always be pulled to ensure latest security patches"
    category: "Security"
    severity: "MEDIUM"
    resource_types: ["Deployment", "Pod", "StatefulSet", "DaemonSet"]
    rule_logic: "spec.template.spec.containers[*].imagePullPolicy must be Always"
    remediation_template: "Set imagePullPolicy to Always for all containers"
    compliance_mappings:
      CIS: "4.1.1"
    enabled: true
    auto_remediable: true
    risk_multiplier: 1.0

  capabilities_restricted:
    rule_id: "SEC005"
    name: "Capabilities Restricted"
    description: "Containers must drop all capabilities and only add required ones"
    category: "Security"
    severity: "HIGH"
    resource_types: ["Deployment", "Pod", "StatefulSet", "DaemonSet"]
    rule_logic: "spec.template.spec.containers[*].securityContext.capabilities.drop must include ALL"
    remediation_template: "Drop all capabilities and add only required ones"
    compliance_mappings:
      CIS: "4.2.3"
      NIST: "PR.AC-4"
    enabled: true
    auto_remediable: true
    risk_multiplier: 1.3

  # Governance Category Policies
  resource_limits_required:
    rule_id: "GOV001"
    name: "Resource Limits Required"
    description: "All containers must have CPU and memory limits"
    category: "Governance"
    severity: "MEDIUM"
    resource_types: ["Deployment", "Pod", "StatefulSet", "DaemonSet"]
    rule_logic: "spec.template.spec.containers[*].resources.limits must exist"
    remediation_template: "Add CPU and memory limits to container resources"
    compliance_mappings:
      FinOps: "Cost Control"
      NIST: "ID.AM-2"
    enabled: true
    auto_remediable: true
    risk_multiplier: 0.8

  required_labels:
    rule_id: "GOV002"
    name: "Required Labels"
    description: "Resources must have required organizational labels"
    category: "Governance"
    severity: "MEDIUM"
    resource_types: ["Deployment", "Service", "Pod", "Namespace"]
    rule_logic: "metadata.labels must contain app, version, owner, environment"
    remediation_template: "Add required labels to resource metadata"
    compliance_mappings:
      SOC2: "CC6.1"
      ISO27001: "A.8.1.1"
    enabled: true
    auto_remediable: true
    risk_multiplier: 0.6

  pod_security_standards:
    rule_id: "GOV003"
    name: "Pod Security Standards"
    description: "Pods must comply with Pod Security Standards"
    category: "Governance"
    severity: "HIGH"
    resource_types: ["Deployment", "Pod", "StatefulSet", "DaemonSet"]
    rule_logic: "Pod Security Standards compliance required"
    remediation_template: "Apply Pod Security Standards at namespace level"
    compliance_mappings:
      CIS: "4.2.0"
      NIST: "PR.AC-4"
    enabled: true
    auto_remediable: false
    risk_multiplier: 1.4

  # Network Category Policies
  network_policies_required:
    rule_id: "NET001"
    name: "Network Policies Required"
    description: "Namespaces must have network policies for segmentation"
    category: "Network"
    severity: "HIGH"
    resource_types: ["Namespace"]
    rule_logic: "NetworkPolicy must exist for namespace"
    remediation_template: "Create network policies to control pod-to-pod communication"
    compliance_mappings:
      CIS: "3.2.1"
      NIST: "PR.AC-4"
    enabled: true
    auto_remediable: false
    risk_multiplier: 1.3

  tls_required:
    rule_id: "NET002"
    name: "TLS Required for Ingress"
    description: "All ingress resources must use TLS encryption"
    category: "Network"
    severity: "HIGH"
    resource_types: ["Ingress"]
    rule_logic: "spec.tls must be defined and non-empty"
    remediation_template: "Add TLS configuration to ingress specification"
    compliance_mappings:
      PCI-DSS: "4.1"
      HIPAA: "164.312"
    enabled: true
    auto_remediable: false
    risk_multiplier: 1.2

  service_mesh_tls:
    rule_id: "NET003"
    name: "Service Mesh TLS"
    description: "Service-to-service communication must use TLS"
    category: "Network"
    severity: "MEDIUM"
    resource_types: ["Service"]
    rule_logic: "Service mesh TLS configuration required"
    remediation_template: "Configure service mesh with mutual TLS"
    compliance_mappings:
      NIST: "PR.DS-2"
    enabled: false  # Optional for service mesh environments
    auto_remediable: false
    risk_multiplier: 1.1

  # AKS-Specific Security Rules
  azure_defender_enabled:
    rule_id: "AKS001"
    name: "Azure Defender for Kubernetes Enabled"
    description: "Azure Defender must be enabled for enhanced threat protection"
    category: "Security"
    severity: "HIGH"
    resource_types: ["Cluster"]
    rule_logic: "Azure Defender for Kubernetes must be enabled"
    remediation_template: "Enable Azure Defender for Kubernetes in Security Center"
    compliance_mappings:
      SOC2: "CC6.1"
      NIST: "DE.CM-1"
    enabled: true
    auto_remediable: true
    risk_multiplier: 1.4

  private_cluster_enabled:
    rule_id: "AKS002"
    name: "Private Cluster Configuration"
    description: "AKS clusters should be configured as private clusters"
    category: "Network"
    severity: "HIGH"
    resource_types: ["Cluster"]
    rule_logic: "apiServerAccessProfile.enablePrivateCluster must be true"
    remediation_template: "Configure cluster as private cluster with private endpoint"
    compliance_mappings:
      CIS: "3.2.1"
      SOC2: "CC6.1"
    enabled: true
    auto_remediable: false
    risk_multiplier: 1.3

  authorized_ip_ranges:
    rule_id: "AKS003"
    name: "Authorized IP Ranges Configured"
    description: "API server access should be restricted to authorized IP ranges"
    category: "Network"
    severity: "MEDIUM"
    resource_types: ["Cluster"]
    rule_logic: "apiServerAccessProfile.authorizedIpRanges must be defined"
    remediation_template: "Configure authorized IP ranges for API server access"
    compliance_mappings:
      CIS: "1.2.1"
      SOC2: "CC6.1"
    enabled: true
    auto_remediable: false
    risk_multiplier: 1.2

  workload_identity_enabled:
    rule_id: "AKS004"
    name: "Workload Identity Enabled"
    description: "Workload identity should be enabled for secure pod authentication"
    category: "Security"
    severity: "HIGH"
    resource_types: ["Cluster"]
    rule_logic: "oidcIssuerProfile.enabled must be true"
    remediation_template: "Enable workload identity and OIDC issuer"
    compliance_mappings:
      NIST: "PR.AC-1"
      SOC2: "CC6.2"
    enabled: true
    auto_remediable: false
    risk_multiplier: 1.3

  image_scanning_enabled:
    rule_id: "AKS005"
    name: "Container Image Scanning"
    description: "Container images must be scanned for vulnerabilities"
    category: "Security"
    severity: "CRITICAL"
    resource_types: ["Deployment", "Pod", "StatefulSet", "DaemonSet"]
    rule_logic: "Container images must be scanned and approved"
    remediation_template: "Implement container image scanning in CI/CD pipeline"
    compliance_mappings:
      SOC2: "CC7.1"
      NIST: "PR.DS-1"
    enabled: true
    auto_remediable: false
    risk_multiplier: 2.0

  pod_security_standards_enforced:
    rule_id: "AKS006"
    name: "Pod Security Standards Enforced"
    description: "Pod security standards must be enforced at namespace level"
    category: "Security"
    severity: "CRITICAL"
    resource_types: ["Namespace"]
    rule_logic: "pod-security.kubernetes.io/enforce label must be set to restricted"
    remediation_template: "Apply pod security standards to namespace"
    compliance_mappings:
      CIS: "4.2.1"
      SOC2: "CC6.1"
    enabled: true
    auto_remediable: true
    risk_multiplier: 1.8

  service_account_automount_disabled:
    rule_id: "AKS007"
    name: "Service Account Auto-mount Disabled"
    description: "Service account tokens should not be automatically mounted"
    category: "Security"
    severity: "MEDIUM"
    resource_types: ["Deployment", "Pod", "StatefulSet", "DaemonSet"]
    rule_logic: "spec.template.spec.automountServiceAccountToken must be false"
    remediation_template: "Disable automatic service account token mounting"
    compliance_mappings:
      CIS: "5.1.1"
      NIST: "PR.AC-4"
    enabled: true
    auto_remediable: true
    risk_multiplier: 1.1

  read_only_root_filesystem:
    rule_id: "AKS008"
    name: "Read-Only Root Filesystem"
    description: "Container root filesystem should be read-only"
    category: "Security"
    severity: "HIGH"
    resource_types: ["Deployment", "Pod", "StatefulSet", "DaemonSet"]
    rule_logic: "spec.template.spec.containers[*].securityContext.readOnlyRootFilesystem must be true"
    remediation_template: "Configure containers with read-only root filesystem"
    compliance_mappings:
      CIS: "4.2.6"
      SOC2: "CC6.1"
    enabled: true
    auto_remediable: true
    risk_multiplier: 1.2

# ===================================================================
# COMPLIANCE FRAMEWORKS WITH CONTROLS
# ===================================================================
compliance_frameworks:
  CIS:
    name: "CIS Kubernetes Benchmark"
    version: "1.6.0"
    categories: ["Master Node", "Worker Node", "Pod Security", "Network", "Storage"]
    controls:
      "CIS-1.1.1":
        control_id: "CIS-1.1.1"
        title: "Ensure API server audit log path is set"
        description: "Enable audit logging for API server activities"
        category: "Master Node Configuration"
        priority: "HIGH"
        implementation_guidance: "Configure --audit-log-path parameter in API server"
        testing_procedure: "Verify audit-log-path is configured in API server manifest"
        automated_check: true
        manual_review_required: false
        remediation_plan: "Configure audit logging in API server"
        
      "CIS-1.2.1":
        control_id: "CIS-1.2.1"
        title: "Ensure API server anonymous auth is disabled"
        description: "Disable anonymous requests to the API server"
        category: "Master Node Configuration"
        priority: "HIGH"
        implementation_guidance: "Set --anonymous-auth=false in API server"
        testing_procedure: "Verify anonymous authentication is disabled"
        automated_check: true
        manual_review_required: false
        remediation_plan: "Disable anonymous authentication in API server"
        
      "CIS-3.2.1":
        control_id: "CIS-3.2.1"
        title: "Ensure network policies are enabled"
        description: "Enable network policies for traffic segmentation"
        category: "Network"
        priority: "HIGH"
        implementation_guidance: "Implement network policies using Calico or Azure CNI"
        testing_procedure: "Verify network policy controller is running"
        automated_check: true
        manual_review_required: false
        remediation_plan: "Deploy network policy controller and policies"
        
      "CIS-4.2.1":
        control_id: "CIS-4.2.1"
        title: "Minimize admission of privileged containers"
        description: "Prevent containers from running in privileged mode"
        category: "Pod Security Policies"
        priority: "CRITICAL"
        implementation_guidance: "Implement Pod Security Policy or OPA Gatekeeper"
        testing_procedure: "Attempt to deploy privileged container and verify it's blocked"
        automated_check: true
        manual_review_required: true
        remediation_plan: "Implement admission control for privileged containers"
        
      "CIS-4.2.6":
        control_id: "CIS-4.2.6"
        title: "Minimize admission of containers running as root"
        description: "Ensure containers do not run as root user"
        category: "Pod Security Policies"
        priority: "HIGH"
        implementation_guidance: "Set runAsUser to non-zero in security context"
        testing_procedure: "Verify containers run as non-root user"
        automated_check: true
        manual_review_required: false
        remediation_plan: "Configure non-root user in container security context"
        
      "CIS-5.1.1":
        control_id: "CIS-5.1.1"
        title: "Ensure RBAC is enabled"
        description: "Verify Role-Based Access Control is properly configured"
        category: "RBAC and Service Accounts"
        priority: "CRITICAL"
        implementation_guidance: "Enable RBAC authorization mode in API server"
        testing_procedure: "Verify RBAC resources exist and are properly configured"
        automated_check: true
        manual_review_required: true
        remediation_plan: "Configure comprehensive RBAC policies"
        
      "CIS-1.1.11":
        control_id: "CIS-1.1.11"
        title: "Ensure etcd data directory permissions are set to 700"
        description: "Ensure that the etcd data directory has permissions of 700"
        category: "Master Node Configuration"
        priority: "HIGH"
        implementation_guidance: "Set etcd data directory permissions to 700"
        testing_procedure: "Verify etcd data directory permissions"
        automated_check: true
        manual_review_required: false
        remediation_plan: "Configure proper etcd data directory permissions"
        
      "CIS-1.2.5":
        control_id: "CIS-1.2.5"
        title: "Ensure kubelet anonymous auth is disabled"
        description: "Disable anonymous authentication to the kubelet server"
        category: "Master Node Configuration"
        priority: "HIGH"
        implementation_guidance: "Set --anonymous-auth=false for kubelet"
        testing_procedure: "Verify kubelet anonymous authentication is disabled"
        automated_check: true
        manual_review_required: false
        remediation_plan: "Disable kubelet anonymous authentication"
        
      "CIS-1.2.6":
        control_id: "CIS-1.2.6"
        title: "Ensure kubelet authorization mode is not AlwaysAllow"
        description: "Do not allow all requests to the kubelet server"
        category: "Master Node Configuration"
        priority: "HIGH"
        implementation_guidance: "Set kubelet --authorization-mode to Webhook"
        testing_procedure: "Verify kubelet authorization mode is properly configured"
        automated_check: true
        manual_review_required: false
        remediation_plan: "Configure proper kubelet authorization mode"
        
      "CIS-1.3.1":
        control_id: "CIS-1.3.1"
        title: "Ensure controller manager profiling is disabled"
        description: "Disable profiling for controller manager"
        category: "Master Node Configuration"
        priority: "MEDIUM"
        implementation_guidance: "Set --profiling=false for controller manager"
        testing_procedure: "Verify controller manager profiling is disabled"
        automated_check: true
        manual_review_required: false
        remediation_plan: "Disable controller manager profiling"
        
      "CIS-1.3.2":
        control_id: "CIS-1.3.2"
        title: "Ensure controller manager use-service-account-credentials is enabled"
        description: "Use individual service account credentials for each controller"
        category: "Master Node Configuration"
        priority: "HIGH"
        implementation_guidance: "Set --use-service-account-credentials=true"
        testing_procedure: "Verify service account credentials are used"
        automated_check: true
        manual_review_required: false
        remediation_plan: "Enable service account credentials for controllers"
        
      "CIS-2.1":
        control_id: "CIS-2.1"
        title: "Ensure kubelet node authorization is enabled"
        description: "Enable node authorization for kubelet"
        category: "Worker Node Configuration"
        priority: "HIGH"
        implementation_guidance: "Configure kubelet with proper node authorization"
        testing_procedure: "Verify kubelet node authorization is enabled"
        automated_check: true
        manual_review_required: false
        remediation_plan: "Enable kubelet node authorization"
        
      "CIS-2.2":
        control_id: "CIS-2.2"
        title: "Minimize admission of containers wishing to share the host process ID namespace"
        description: "Do not allow containers to share the host process namespace"
        category: "Worker Node Configuration"
        priority: "HIGH"
        implementation_guidance: "Implement Pod Security Policy to block hostPID"
        testing_procedure: "Verify hostPID sharing is blocked"
        automated_check: true
        manual_review_required: false
        remediation_plan: "Block containers from sharing host PID namespace"
        
      "CIS-2.3":
        control_id: "CIS-2.3"
        title: "Minimize admission of containers wishing to share the host IPC namespace"
        description: "Do not allow containers to share the host IPC namespace"
        category: "Worker Node Configuration"
        priority: "HIGH"
        implementation_guidance: "Implement Pod Security Policy to block hostIPC"
        testing_procedure: "Verify hostIPC sharing is blocked"
        automated_check: true
        manual_review_required: false
        remediation_plan: "Block containers from sharing host IPC namespace"
        
      "CIS-2.4":
        control_id: "CIS-2.4"
        title: "Minimize admission of containers wishing to share the host network namespace"
        description: "Do not allow containers to share the host network namespace"
        category: "Worker Node Configuration"
        priority: "HIGH"
        implementation_guidance: "Implement Pod Security Policy to block hostNetwork"
        testing_procedure: "Verify hostNetwork sharing is blocked"
        automated_check: true
        manual_review_required: false
        remediation_plan: "Block containers from sharing host network namespace"
        
      "CIS-3.1.1":
        control_id: "CIS-3.1.1"
        title: "Ensure client certificate authentication is used for users"
        description: "Use client certificate authentication for user access"
        category: "Network"
        priority: "HIGH"
        implementation_guidance: "Configure client certificate authentication"
        testing_procedure: "Verify client certificate authentication is configured"
        automated_check: true
        manual_review_required: true
        remediation_plan: "Implement client certificate authentication"
        
      "CIS-4.1.1":
        control_id: "CIS-4.1.1"
        title: "Ensure Image Pull Policy is set to Always"
        description: "Always pull container images to ensure latest security patches"
        category: "Pod Security Policies"
        priority: "MEDIUM"
        implementation_guidance: "Set imagePullPolicy to Always for all containers"
        testing_procedure: "Verify image pull policy is set to Always"
        automated_check: true
        manual_review_required: false
        remediation_plan: "Configure image pull policy to Always"
        
      "CIS-4.2.2":
        control_id: "CIS-4.2.2"
        title: "Minimize admission of containers with allowPrivilegeEscalation"
        description: "Prevent containers from escalating privileges"
        category: "Pod Security Policies"
        priority: "CRITICAL"
        implementation_guidance: "Set allowPrivilegeEscalation to false"
        testing_procedure: "Verify privilege escalation is blocked"
        automated_check: true
        manual_review_required: false
        remediation_plan: "Block privilege escalation in containers"
        
      "CIS-4.2.3":
        control_id: "CIS-4.2.3"
        title: "Minimize admission of containers running with root capabilities"
        description: "Drop all capabilities and only add required ones"
        category: "Pod Security Policies"
        priority: "HIGH"
        implementation_guidance: "Drop ALL capabilities and add only required ones"
        testing_procedure: "Verify containers drop all capabilities"
        automated_check: true
        manual_review_required: false
        remediation_plan: "Configure proper capability management"
        
      "CIS-4.2.4":
        control_id: "CIS-4.2.4"
        title: "Minimize admission of containers with capabilities assigned"
        description: "Restrict Linux capabilities assigned to containers"
        category: "Pod Security Policies"
        priority: "HIGH"
        implementation_guidance: "Implement restricted capability policies"
        testing_procedure: "Verify capability restrictions are enforced"
        automated_check: true
        manual_review_required: false
        remediation_plan: "Implement capability restriction policies"
        
      "CIS-4.2.5":
        control_id: "CIS-4.2.5"
        title: "Minimize admission of containers with SEC_PROC_MOUNT"
        description: "Restrict containers from mounting /proc with write access"
        category: "Pod Security Policies"
        priority: "MEDIUM"
        implementation_guidance: "Block containers with securityContext.procMount"
        testing_procedure: "Verify procMount restrictions are enforced"
        automated_check: true
        manual_review_required: false
        remediation_plan: "Block containers with procMount capabilities"
        
      "CIS-5.1.2":
        control_id: "CIS-5.1.2"
        title: "Minimize access to secrets"
        description: "Restrict access to Kubernetes secrets"
        category: "RBAC and Service Accounts"
        priority: "HIGH"
        implementation_guidance: "Implement least privilege access to secrets"
        testing_procedure: "Verify secret access is properly restricted"
        automated_check: true
        manual_review_required: true
        remediation_plan: "Implement least privilege secret access"
        
      "CIS-5.1.3":
        control_id: "CIS-5.1.3"
        title: "Minimize wildcard use in Roles and ClusterRoles"
        description: "Avoid using wildcards in RBAC permissions"
        category: "RBAC and Service Accounts"
        priority: "HIGH"
        implementation_guidance: "Use specific permissions instead of wildcards"
        testing_procedure: "Verify no wildcard permissions are used"
        automated_check: true
        manual_review_required: true
        remediation_plan: "Replace wildcard permissions with specific ones"
        
      "CIS-5.1.4":
        control_id: "CIS-5.1.4"
        title: "Minimize access to create pods"
        description: "Restrict who can create pods in the cluster"
        category: "RBAC and Service Accounts"
        priority: "HIGH"
        implementation_guidance: "Limit pod creation permissions to necessary users"
        testing_procedure: "Verify pod creation access is restricted"
        automated_check: true
        manual_review_required: true
        remediation_plan: "Implement restricted pod creation permissions"
        
      "CIS-5.2.1":
        control_id: "CIS-5.2.1"
        title: "Minimize the admission of pods with automountServiceAccountToken"
        description: "Prevent automatic mounting of service account tokens"
        category: "RBAC and Service Accounts"
        priority: "MEDIUM"
        implementation_guidance: "Set automountServiceAccountToken to false"
        testing_procedure: "Verify service account tokens are not auto-mounted"
        automated_check: true
        manual_review_required: false
        remediation_plan: "Disable automatic service account token mounting"
        
    description: "Center for Internet Security Kubernetes Benchmark"
    priority_weight: 1.2
    auto_update: true

  NIST:
    name: "NIST Cybersecurity Framework"
    version: "1.1"
    categories: ["Identify", "Protect", "Detect", "Respond", "Recover"]
    controls:
      "NIST-PR.AC-1":
        control_id: "NIST-PR.AC-1"
        title: "Identities and credentials are managed for authorized devices and users"
        description: "Implement proper identity and access management"
        category: "Access Control"
        priority: "HIGH"
        implementation_guidance: "Configure Azure AD integration and proper RBAC"
        testing_procedure: "Verify identity management and access controls"
        automated_check: true
        manual_review_required: true
        remediation_plan: "Implement comprehensive identity and access management"
        
      "NIST-PR.AC-4":
        control_id: "NIST-PR.AC-4"
        title: "Access permissions are managed incorporating principles of least privilege"
        description: "Ensure least privilege access control"
        category: "Access Control"
        priority: "HIGH"
        implementation_guidance: "Implement least privilege RBAC policies"
        testing_procedure: "Review and test access permissions for least privilege"
