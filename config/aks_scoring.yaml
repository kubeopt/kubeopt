      max_filterable_percentage: 0.60      # Maximum 60% can be safely filtered
      min_monthly_savings: 50              # Minimum $50/month savings to recommend
    
    retention_optimization:
      min_retention_days: 30               # Minimum 30 days retention recommended
      optimal_retention_days: 90           # Optimal 90 days retention
      max_retention_days: 730              # Maximum 2 years retention
      min_monthly_savings: 100             # Minimum $100/month savings to recommend
    
    workspace_consolidation:
      min_workspaces_for_consolidation: 3  # Need 3+ workspaces to recommend consolidation
      min_combined_gb_daily: 5             # Minimum 5GB/day combined to consolidate
      consolidation_efficiency_gain: 0.15  # 15% efficiency gain from consolidation
  
  # Cost Cap and Validation
  cost_caps:
    max_savings_percentage: 0.80           # Maximum 80% savings from any optimization
    max_monthly_savings_no_actual_cost: 50 # Maximum $50/month savings without actual cost data
    confidence_penalty_no_data: 0.5       # 50% confidence penalty without actual data
    
  # Quality and Confidence Standards
  data_quality:
