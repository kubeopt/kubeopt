    # Cost estimation factors
    estimation_factors:
      cluster_attribution_default: 0.4     # Default 40% of workspace costs attributed to cluster
      container_insights_overhead: 0.15    # 15% additional cost for Container Insights
      prometheus_metrics_factor: 0.10      # 10% additional cost for Prometheus metrics
      custom_metrics_factor: 0.05          # 5% additional cost for custom metrics
      
    # Naming pattern weights for cluster attribution
    naming_attribution:
      exact_cluster_name_match: 0.9        # 90% attribution if workspace name contains cluster name
      resource_group_match: 0.6            # 60% attribution if same resource group
      container_insights_match: 0.8        # 80% attribution if Container Insights detected
      aks_related_match: 0.5               # 50% attribution if AKS-related naming detected
      default_fallback: 0.3                # 30% attribution as fallback
  
  # Volume Estimation Standards  
  volume_estimation:
    # Per-workload baseline volumes (GB/day)
    baseline_volumes:
      pod_application_logs: 0.015          # 15MB per pod per day
      pod_system_logs: 0.005               # 5MB per pod per day  
