    high_confidence_requirements:
      actual_cost_data: true               # Must have actual billing costs
      workspace_usage_data: true          # Must have workspace usage data  
      cluster_attribution_data: true      # Must have cluster-specific attribution
      min_data_points: 7                  # Minimum 7 days of data
    
    # Confidence scoring factors
    confidence_factors:
      actual_costs_available: 0.4         # 40% weight for actual cost data
      usage_data_available: 0.3           # 30% weight for usage data
      attribution_accuracy: 0.2           # 20% weight for attribution accuracy
      data_completeness: 0.1              # 10% weight for data completeness

