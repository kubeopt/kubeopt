# Unified Optimization Scoring Framework
optimization_scoring:
  # Primary scoring weights (must sum to 1.0)
  weights:
    current_efficiency: 0.40          # How well the cluster is currently performing
    optimization_potential: 0.25     # Room for improvement (but lower weight)
    configuration_quality: 0.20      # HPA, resource requests/limits, etc.
    cost_effectiveness: 0.15          # Cost vs value delivered
  
  # Current efficiency scoring (higher is better)
  current_efficiency:
    cpu_utilization_optimal: [60, 80]     # Optimal CPU range
    memory_utilization_optimal: [65, 85]  # Optimal memory range
    node_utilization_target: 75           # Target node utilization
    waste_threshold_max: 0.20             # Max 20% acceptable waste
    
    # Scoring bands
    excellent_threshold: 0.85             # 85%+ = excellent
    good_threshold: 0.70                  # 70%+ = good
    fair_threshold: 0.50                  # 50%+ = fair
    poor_threshold: 0.30                  # <30% = poor
  
  # Optimization potential (inverse scoring - less potential needed = better current state)
  optimization_potential:
    low_potential_bonus: 1.0              # High score when little optimization needed
    medium_potential_score: 0.7           # Medium score for medium optimization needs
    high_potential_penalty: 0.4           # Lower score when major optimization needed
    
    # Thresholds for potential categories
    low_potential_max: 0.10               # <10% savings potential = low
    medium_potential_max: 0.25            # <25% savings potential = medium
    high_potential_min: 0.25              # >25% savings potential = high
  
  # Configuration quality scoring
  configuration_quality:
    hpa_coverage_target: 0.80             # 80% of workloads should have HPA
    resource_requests_target: 0.90        # 90% should have resource requests
    resource_limits_target: 0.85          # 85% should have resource limits
    security_standards_target: 0.95       # 95% should meet security standards
    
    # Scoring weights for config components
    hpa_weight: 0.30
    resources_weight: 0.40
    security_weight: 0.30
  
  # Cost effectiveness scoring
  cost_effectiveness:
    cost_per_workload_bands:
      excellent: [0, 50]                  # $0-50 per workload per month
      good: [51, 100]                     # $51-100 per workload per month
      fair: [101, 200]                    # $101-200 per workload per month
      poor: [201, 999999]                 # >$200 per workload per month
    
    value_metrics:
      uptime_target: 0.995                # 99.5% uptime target
      response_time_target_ms: 200        # 200ms response time target
      error_rate_max: 0.005               # 0.5% max error rate
  
  # Final score calculation
  score_calculation:
    scale: 100                            # Final score 0-100
    minimum_score: 5                      # Minimum possible score
    confidence_threshold: 0.8             # Minimum confidence for reliable score
    
    # Score interpretation
    interpretation:
      excellent: [90, 100]                # 90-100 = Excellent
      good: [75, 89]                      # 75-89 = Good
      fair: [60, 74]                      # 60-74 = Fair
      poor: [40, 59]                      # 40-59 = Poor
      critical: [0, 39]                   # 0-39 = Critical

# Observability Cost Collection and Calculation Standards
observability_cost_standards:
  # Data Collection Configuration
  data_collection:
    # Cache key names for observability data
    cache_keys:
      workspaces: "log_analytics_workspaces_sdk"
      app_insights: "application_insights_components_sdk"
      billing_costs: "observability_costs_billing_sdk"
      consumption_usage: "consumption_usage_observability_sdk"
    
    # Timeframe configuration  
    timeframes:
      cost_query_days: 30                   # Days to query for cost data
      usage_analysis_days: 7                # Days to analyze for usage patterns
      trend_analysis_days: 90               # Days for trend analysis
    
    # Minimum thresholds for meaningful data
    thresholds:
      min_daily_gb_for_analysis: 0.1        # Minimum 0.1GB/day to consider
      min_monthly_cost_for_optimization: 10  # Minimum $10/month to optimize
      min_confidence_for_projections: 0.7   # Minimum confidence for cost projections
  
