<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logger Test</title>
    <meta name="log-level" content="INFO">
    <meta name="production-mode" content="false">
</head>
<body>
    <h1>AKS Cost Optimizer - Logger Test</h1>
    <p>Open the console to see the logging output.</p>
    
    <button onclick="testLogging()">Test All Log Levels</button>
    <button onclick="testLogLevels()">Test Different Log Levels</button>
    <button onclick="testProductionMode()">Test Production Mode</button>
    
    <script src="presentation/web/static/js/logger.js"></script>
    
    <script>
        function testLogging() {
            logDebug('=== Testing All Log Levels ===');
            logError('This is an error message');
            logWarn('This is a warning message');
            logDebug('This is an info message');
            logDebug('This is a debug message');
        }
        
        function testLogLevels() {
            logDebug('=== Testing Different Log Levels ===');
            
            // Test ERROR level
            logDebug('Setting log level to ERROR');
            window.Logger.currentLevel = 1;
            logError('ERROR level: This should show');
            logWarn('ERROR level: This should NOT show');
            logDebug('ERROR level: This should NOT show');
            logDebug('ERROR level: This should NOT show');
            
            // Test WARN level
            logDebug('Setting log level to WARN');
            window.Logger.currentLevel = 2;
            logError('WARN level: This should show');
            logWarn('WARN level: This should show');
            logDebug('WARN level: This should NOT show');
            logDebug('WARN level: This should NOT show');
            
            // Test INFO level
            logDebug('Setting log level to INFO');
            window.Logger.currentLevel = 3;
            logError('INFO level: This should show');
            logWarn('INFO level: This should show');
            logDebug('INFO level: This should show');
            logDebug('INFO level: This should NOT show');
            
            // Test DEBUG level
            logDebug('Setting log level to DEBUG');
            window.Logger.currentLevel = 4;
            logError('DEBUG level: This should show');
            logWarn('DEBUG level: This should show');
            logDebug('DEBUG level: This should show');
            logDebug('DEBUG level: This should show');
        }
        
        function testProductionMode() {
            logDebug('=== Testing Production Mode ===');
            logDebug('Current logger info:', window.Logger.getInfo());
            
            // Simulate production mode
            window.Logger.isProduction = true;
            window.Logger.currentLevel = 1; // Only errors in production
            
            logError('Production mode: This should show');
            logWarn('Production mode: This should NOT show');
            logDebug('Production mode: This should NOT show');
            logDebug('Production mode: This should NOT show');
            
            // Reset to development
            window.Logger.isProduction = false;
            window.Logger.currentLevel = 3;
            logDebug('Reset to development mode');
        }
        
        // Auto-test on page load
        window.addEventListener('load', function() {
            logDebug('Logger info:', window.Logger.getInfo());
            logDebug('Available functions:', {
                logError: typeof logError,
                logWarn: typeof logWarn,
                logDebug: typeof logDebug,
                logDebug: typeof logDebug
            });
        });
    </script>
</body>
</html>
