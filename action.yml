name: 'KubeOpt Cost Scan'
description: 'Scan Kubernetes cluster costs and report savings opportunities'

inputs:
  kubeopt-url:
    description: 'URL of your KubeOpt instance'
    required: true
  kubeopt-username:
    description: 'KubeOpt username'
    required: true
    default: 'kubeopt'
  kubeopt-password:
    description: 'KubeOpt password'
    required: true
  cluster-id:
    description: 'Specific cluster ID to scan (omit for all clusters)'
    required: false
    default: ''
  top:
    description: 'Number of top opportunities to show'
    required: false
    default: '5'
  post-comment:
    description: 'Post results as PR comment (true/false)'
    required: false
    default: 'true'

outputs:
  total-savings:
    description: 'Total potential monthly savings in USD'
    value: ${{ steps.parse.outputs.total-savings }}
  scan-summary:
    description: 'Markdown summary of scan results'
    value: ${{ steps.parse.outputs.scan-summary }}

runs:
  using: composite
  steps:

    # ------------------------------------------------------------------ #
    # 1. Mask secrets before any output appears in the log
    # ------------------------------------------------------------------ #
    - name: Mask secrets
      shell: bash
      run: |
        echo "::add-mask::${{ inputs.kubeopt-url }}"
        echo "::add-mask::${{ inputs.kubeopt-password }}"

    # ------------------------------------------------------------------ #
    # 2. Check out the KubeOpt source (provides cli.py)
    # ------------------------------------------------------------------ #
    - name: Check out KubeOpt
      uses: actions/checkout@v4
      with:
        repository: kubeopt/kubeopt
        ref: main
        path: _kubeopt_src

    # ------------------------------------------------------------------ #
    # 3. Set up Python and install requirements
    # ------------------------------------------------------------------ #
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: pip
        cache-dependency-path: _kubeopt_src/requirements/requirements.txt

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip --quiet
        pip install -r _kubeopt_src/requirements/requirements.txt --quiet

    # ------------------------------------------------------------------ #
    # 4. Run the cost scan and capture JSON output
    # ------------------------------------------------------------------ #
    - name: Run KubeOpt scan
      id: scan
      shell: bash
      env:
        KUBEOPT_URL: ${{ inputs.kubeopt-url }}
        KUBEOPT_USERNAME: ${{ inputs.kubeopt-username }}
        KUBEOPT_PASSWORD: ${{ inputs.kubeopt-password }}
      run: |
        ARGS="--json --top ${{ inputs.top }}"
        if [ -n "${{ inputs.cluster-id }}" ]; then
          ARGS="$ARGS --cluster ${{ inputs.cluster-id }}"
        fi

        python _kubeopt_src/cli.py scan $ARGS > /tmp/kubeopt_scan.json 2>/tmp/kubeopt_scan.err
        STATUS=$?

        if [ $STATUS -ne 0 ]; then
          echo "::error::KubeOpt scan failed. See below for details."
          cat /tmp/kubeopt_scan.err >&2
          exit 1
        fi

        echo "Scan completed successfully."

    # ------------------------------------------------------------------ #
    # 5. Parse JSON and produce markdown + step outputs
    #    Using shell: python avoids heredoc-in-YAML pipe-character issues
    # ------------------------------------------------------------------ #
    - name: Parse and format results
      id: parse
      shell: python
      run: |
        import json, os, sys, datetime

        SCAN_PATH = "/tmp/kubeopt_scan.json"
        try:
            with open(SCAN_PATH) as f:
                data = json.load(f)
        except Exception as e:
            print(f"::error::Could not parse scan output: {e}", file=sys.stderr)
            sys.exit(1)

        scan_date  = data.get("scan_date",          datetime.date.today().isoformat())
        total_cost = data.get("total_monthly_cost", 0)
        total_sav  = data.get("total_savings",      0)
        clusters   = data.get("clusters",           [])
        opps       = data.get("opportunities",      [])

        # ---- cluster table rows ----
        if clusters:
            cluster_rows = "\n".join(
                f"| {c.get('cluster_id','—')} "
                f"| {c.get('provider','—')} "
                f"| ${c.get('monthly_cost', 0):,.0f} "
                f"| ${c.get('savings', 0):,.0f}/mo |"
                for c in clusters
            )
        else:
            cluster_rows = "| — | — | — | — |"

        # ---- opportunities list ----
        if opps:
            opp_lines = "\n".join(
                f"{i}. ${opp.get('savings', 0):,.0f}/mo"
                f" — {opp.get('cluster_id', '—')}"
                f" — {opp.get('description', 'opportunity')}"
                for i, opp in enumerate(opps, 1)
            )
        else:
            opp_lines = "_No detailed opportunities returned._"

        total_fmt = f"{total_sav:,.0f}"

        md_lines = [
            f"## KubeOpt Cost Scan \u2014 {scan_date}",
            "",
            "| Cluster | Provider | Monthly Spend | Savings Available |",
            "|---------|----------|--------------|-------------------|",
            cluster_rows,
            "",
            f"**Total potential savings: ${total_fmt}/mo**",
            "",
            "<details>",
            "<summary>Top opportunities</summary>",
            "",
            opp_lines,
            "",
            "</details>",
        ]
        md = "\n".join(md_lines)

        # ---- write to GITHUB_OUTPUT ----
        github_output = os.environ.get("GITHUB_OUTPUT", "")
        if github_output:
            delimiter = "KUBEOPT_MD_EOF"
            with open(github_output, "a") as out:
                out.write(f"total-savings={total_sav:.2f}\n")
                out.write(f"scan-summary<<{delimiter}\n{md}\n{delimiter}\n")

        print(f"Parsed successfully. Total savings: ${total_fmt}/mo "
              f"across {data.get('total_clusters', '?')} cluster(s).")

    # ------------------------------------------------------------------ #
    # 6. Write to GitHub Step Summary (always runs, even on failure)
    # ------------------------------------------------------------------ #
    - name: Write step summary
      if: always()
      shell: python
      run: |
        import json, os, sys, datetime

        SCAN_PATH = "/tmp/kubeopt_scan.json"
        summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "")
        if not summary_path:
            print("GITHUB_STEP_SUMMARY not set — skipping.")
            sys.exit(0)

        if not os.path.exists(SCAN_PATH):
            with open(summary_path, "a") as f:
                f.write("## KubeOpt Cost Scan\n\n"
                        "_Scan did not produce output \u2014 check logs for errors._\n")
            sys.exit(0)

        try:
            with open(SCAN_PATH) as f:
                data = json.load(f)
        except Exception as e:
            with open(summary_path, "a") as f:
                f.write(f"## KubeOpt Cost Scan\n\n_Could not parse scan output: {e}_\n")
            sys.exit(0)

        scan_date = data.get("scan_date",     datetime.date.today().isoformat())
        total_sav = data.get("total_savings", 0)
        clusters  = data.get("clusters",      [])
        opps      = data.get("opportunities", [])

        if clusters:
            cluster_rows = "\n".join(
                f"| {c.get('cluster_id','—')} "
                f"| {c.get('provider','—')} "
                f"| ${c.get('monthly_cost', 0):,.0f} "
                f"| ${c.get('savings', 0):,.0f}/mo |"
                for c in clusters
            )
        else:
            cluster_rows = "| — | — | — | — |"

        if opps:
            opp_lines = "\n".join(
                f"{i}. ${opp.get('savings', 0):,.0f}/mo"
                f" — {opp.get('cluster_id', '—')}"
                f" — {opp.get('description', 'opportunity')}"
                for i, opp in enumerate(opps, 1)
            )
        else:
            opp_lines = "_No detailed opportunities returned._"

        total_fmt = f"{total_sav:,.0f}"

        md_lines = [
            f"## KubeOpt Cost Scan \u2014 {scan_date}",
            "",
            "| Cluster | Provider | Monthly Spend | Savings Available |",
            "|---------|----------|--------------|-------------------|",
            cluster_rows,
            "",
            f"**Total potential savings: ${total_fmt}/mo**",
            "",
            "<details>",
            "<summary>Top opportunities</summary>",
            "",
            opp_lines,
            "",
            "</details>",
        ]
        md = "\n".join(md_lines)

        with open(summary_path, "a") as f:
            f.write(md + "\n")

        print("Step summary written.")

    # ------------------------------------------------------------------ #
    # 7. Post PR comment (only on pull_request events when opted in)
    # ------------------------------------------------------------------ #
    - name: Post PR comment
      if: ${{ inputs.post-comment == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');

          let data;
          try {
            data = JSON.parse(fs.readFileSync('/tmp/kubeopt_scan.json', 'utf8'));
          } catch (e) {
            core.warning('Could not read scan output for PR comment: ' + e.message);
            return;
          }

          const scanDate = data.scan_date  || new Date().toISOString().split('T')[0];
          const totalSav = data.total_savings || 0;
          const clusters = data.clusters      || [];
          const opps     = data.opportunities || [];

          // ---- cluster table ----
          const fmtNum = n => Number(n || 0).toLocaleString('en-US', { maximumFractionDigits: 0 });

          let clusterRows = '';
          if (clusters.length > 0) {
            for (const c of clusters) {
              clusterRows +=
                `| ${c.cluster_id  || '—'} ` +
                `| ${c.provider    || '—'} ` +
                `| $${fmtNum(c.monthly_cost)} ` +
                `| $${fmtNum(c.savings)}/mo |\n`;
            }
          } else {
            clusterRows = '| — | — | — | — |\n';
          }

          // ---- opportunities list ----
          let oppLines = '';
          opps.forEach((opp, i) => {
            oppLines +=
              `${i + 1}. $${fmtNum(opp.savings)}/mo` +
              ` — ${opp.cluster_id  || '—'}` +
              ` — ${opp.description || 'opportunity'}\n`;
          });
          if (!oppLines) oppLines = '_No detailed opportunities returned._\n';

          const body = [
            `## KubeOpt Cost Scan \u2014 ${scanDate}`,
            '',
            '| Cluster | Provider | Monthly Spend | Savings Available |',
            '|---------|----------|--------------|-------------------|',
            clusterRows.trimEnd(),
            '',
            `**Total potential savings: $${fmtNum(totalSav)}/mo**`,
            '',
            '<details>',
            '<summary>Top opportunities</summary>',
            '',
            oppLines.trimEnd(),
            '',
            '</details>',
            '',
            '---',
            '_Powered by [KubeOpt](https://github.com/kubeopt/kubeopt) \u2014 Kubernetes cost intelligence_',
          ].join('\n');

          const MARKER = '## KubeOpt Cost Scan';

          // Upsert: update existing bot comment or create a new one
          const { data: comments } = await github.rest.issues.listComments({
            owner:        context.repo.owner,
            repo:         context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.find(
            c => c.user.type === 'Bot' && c.body.includes(MARKER)
          );

          if (existing) {
            await github.rest.issues.updateComment({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              comment_id: existing.id,
              body,
            });
            core.info('Updated existing KubeOpt PR comment.');
          } else {
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            core.info('Created new KubeOpt PR comment.');
          }
